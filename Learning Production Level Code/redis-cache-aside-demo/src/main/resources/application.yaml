spring:
  application:
    name: redis-cache-aside-demo
  data:
    redis:
      host: localhost
      port: 6379

  datasource:
    url: jdbc:postgresql://localhost:5432/cache-aside-demo
    username: postgres
    password: 123
    driver-class-name: org.postgresql.Driver

    hikari:
      pool-name: redis-cache-aside-demo-hikari-pool
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1800000
      leak-detection-threshold: 20000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
        show_sql: true