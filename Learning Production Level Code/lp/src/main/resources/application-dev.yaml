spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/lp_dev
    username: postgres
    password: 123
    driver-class-name: org.postgresql.Driver

    hikari:
      pool-name: lp-dev-hikari
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1800000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    validate-on-migrate: true
  #    enabled: true
#    locations: classpath:db/migration
  #    baseline-on-migrate: off
  #    baseline-version: 1

server:
  port: 8080

logging:
  level:
    root: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    com.zaxxer.hikari: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: never